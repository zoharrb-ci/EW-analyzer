<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWMN Movement Engine - Research Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        canvas { width: 100%; height: auto; display: block; }

        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Control Panel */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        button#sorToggle {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,204,0.3);
            transition: all 0.2s;
        }

        button#sorToggle:hover { background: #00cca3; transform: scale(1.05); }

        /* Data Tables */
        .data-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        table { width: 100%; border-collapse: collapse; font-family: monospace; font-size: 11px; }
        th { text-align: left; padding-bottom: 8px; border-bottom: 1px solid #333; opacity: 0.8; }
        td { padding: 4px 0; }

        .highlight-ew { color: #00ffcc; font-weight: bold; font-size: 13px; }
        .status-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas"></canvas>

    <div id="controls">
        <button id="sorToggle" onclick="handleToggle()">SoR: ABSOLUTE</button>
    </div>

    <div id="hud">
        <div id="status_panel" class="data-panel">
            <span class="status-badge">Engine Status:</span>
            <div id="status">WAITING FOR CAMERA...</div>
        </div>

        <div id="data_display" class="data-panel">
            <div style="opacity: 0.5; font-style: italic;">Awaiting movement...</div>
        </div>
    </div>
</div>

<script src="ew_engine.js"></script>
<script src="ui_renderer.js"></script>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // Handle SoR Toggle through the engine
    function handleToggle() {
        const currentMode = toggleSoR(); // Calls function in ew_engine.js
        document.getElementById('sorToggle').innerText = `SoR: ${currentMode.toUpperCase()}`;
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
        // 1. Process Raw Data through EWMN Engine
        const ewData = calculateEWMN(results.poseLandmarks);

        // 2. Render UI Overlays
        updateHUD(ewData);

        // 3. Draw Visualizations on Canvas
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        drawScene(results, canvasCtx, canvasElement, ewData);
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await pose.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>

</body>
</html>
