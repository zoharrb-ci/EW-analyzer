<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWMN Movement Analyzer</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; background: #000; }
        #input_video { display: none; } 
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #hud { 
            position: absolute; right: 20px; top: 20px; width: 280px;
            background: rgba(0,0,0,0.8); color: #0f0; padding: 15px; 
            font-family: 'Courier New', monospace; border: 1px solid #0f0;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
        <div id="hud">
            <h3 style="margin-top:0">EWMN ANALYZER</h3>
            <div id="r_hand">R-ARM: H - | V -</div>
            <div id="l_hand">L-ARM: H - | V -</div>
            <hr>
            <div id="status">STATUS: INITIALIZING...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script src="ew_engine.js"></script>
    <script src="ui_renderer.js"></script>
    <script src="camera_module.js"></script>
</body>
</html>
