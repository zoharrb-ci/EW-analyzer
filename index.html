<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EWMN Dynamic Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ffcc; font-family: monospace; }
        canvas { width: 100vw; height: 100vh; transform: scaleX(-1); }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stats-panel { background: rgba(0,20,20,0.8); border: 1px solid #00ffcc; padding: 15px; border-radius: 5px; width: 250px; }
        .val { color: white; font-weight: bold; font-size: 1.2em; }
        #recalibrate-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(255,0,0,0.5); padding: 10px; display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats-panel">
        <div style="font-size: 10px; opacity: 0.7;">DYNAMIC SoR STATUS</div>
        <div id="tracking-status">INITIATING...</div>
        <hr style="border: 0; border-top: 1px solid #004444; margin: 10px 0;">
        <div>SCALE: <span id="scale-val" class="val">1.00</span></div>
        <div>RIGHT: <span id="r-val" class="val">--</span></div>
        <div>LEFT: <span id="l-val" class="val">--</span></div>
    </div>
</div>

<div id="recalibrate-flash">DISTANCE WARNING: SUBJECT TOO CLOSE</div>
<canvas id="output_canvas"></canvas>
<video id="input_video" style="display:none;"></video>

<script src="ew_engine.js"></script>
<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const ctx = canvasElement.getContext('2d');

const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({ modelComplexity: 2, smoothLandmarks: true, minDetectionConfidence: 0.5 });

pose.onResults((results) => {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks) {
        const ewData = calculateEWMN(results.poseLandmarks);
        drawInterface(results.poseLandmarks, ewData);
        updateText(ewData);
    }
    ctx.restore();
});

function drawInterface(landmarks, data) {
    // 1. Draw "Origin Crosshair" on Sternum
    const ox = data.origin.x * canvasElement.width;
    const oy = data.origin.y * canvasElement.height;
    
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ox, oy, 30 * data.scale * 10, 0, Math.PI * 2); // Visual sphere scales with you
    ctx.moveTo(ox - 20, oy); ctx.lineTo(ox + 20, oy);
    ctx.moveTo(ox, oy - 20); ctx.lineTo(ox, oy + 20);
    ctx.stroke();

    // 2. Draw Limb Vectors
    const limbs = [
        {s: 14, e: 16, color: '#ff4444'}, // Right
        {s: 13, e: 15, color: '#ffff00'}  // Left
    ];
    
    limbs.forEach(l => {
        const start = landmarks[l.s];
        const end = landmarks[l.e];
        ctx.beginPath();
        ctx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
        ctx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
        ctx.strokeStyle = l.color;
        ctx.lineWidth = 5;
        ctx.stroke();
    });
}

function updateText(data) {
    document.getElementById('scale-val').innerText = data.scale.toFixed(3);
    document.getElementById('r-val').innerText = `H${data.right.ewmn.h} V${data.right.ewmn.v}`;
    document.getElementById('l-val').innerText = `H${data.left.ewmn.h} V${data.left.ewmn.v}`;
    document.getElementById('tracking-status').innerText = "CALIBRATED & TRACKING";
    
    // Proximity Warning
    document.getElementById('recalibrate-flash').style.display = data.scale > 0.4 ? 'block' : 'none';
}

const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); },
    width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
