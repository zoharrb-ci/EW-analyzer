<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EWMN Researcher - Tracing & Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; transform: scaleX(-1); position: absolute; }
        
        /* UI OVERLAY */
        #controls { position: absolute; bottom: 30px; left: 30px; width: 300px; z-index: 20; background: rgba(0,20,25,0.85); border: 1px solid #00ffcc; padding: 15px; border-radius: 4px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #888; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        button { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 5px 10px; cursor: pointer; margin-right: 5px; font-family: inherit; font-size: 11px; }
        button:hover { background: #00ffcc; color: #000; }
        button.active { background: #ff4444; color: #fff; border-color: #ff4444; }

        #status-indicator { position: absolute; top: 20px; left: 20px; font-size: 12px; display: flex; align-items: center; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #555; }
        .dot.rec { background: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="output_canvas"></canvas>
<div id="status-indicator"><span class="dot" id="rec-dot"></span> <span id="status-text">WAITING FOR GESTURE...</span></div>

<div id="controls">
    <div class="control-group">
        <label>TRACE TRANSPARENCY</label>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="control-group">
        <button id="btn-trace" onclick="toggleTrace()">START TRACING</button>
        <button onclick="clearTrace()">CLEAR PATHS</button>
    </div>
    <div style="font-size: 9px; opacity: 0.6;">* Gesture: Bring hands together to Toggle Tracing</div>
</div>

<script src="ew_engine.js"></script>
<script>
let isTracing = false;
let traceOpacity = 0.5;
const traceHistory = []; // Stores path points

const opacitySlider = document.getElementById('opacity-slider');
opacitySlider.oninput = (e) => traceOpacity = e.target.value;

function toggleTrace() {
    isTracing = !isTracing;
    const btn = document.getElementById('btn-trace');
    const dot = document.getElementById('rec-dot');
    btn.innerText = isTracing ? "STOP TRACING" : "START TRACING";
    btn.className = isTracing ? "active" : "";
    dot.className = isTracing ? "dot rec" : "dot";
    document.getElementById('status-text').innerText = isTracing ? "TRACING ACTIVE" : "GESTURE READY";
}

function clearTrace() {
    traceHistory.length = 0;
}

// Integration with Pose Loop
const videoElement = document.createElement('video');
const canvasElement = document.getElementById('output_canvas');
const ctx = canvasElement.getContext('2d');

const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

pose.onResults((results) => {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // Draw Video Feed
    ctx.globalAlpha = 1.0;
    ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        
        // 1. GESTURE ACTIVATION CHECK
        // Trigger: Right Hand (16) and Left Hand (15) close proximity
        const dist = Math.hypot(landmarks[15].x - landmarks[16].x, landmarks[15].y - landmarks[16].y);
        if (dist < 0.05) { // Cooldown/debounce logic would be added in production
            if (!this.lastGestureTime || Date.now() - this.lastGestureTime > 2000) {
                toggleTrace();
                this.lastGestureTime = Date.now();
            }
        }

        // 2. RECORD TRACE
        if (isTracing) {
            traceHistory.push({
                r: { x: landmarks[16].x * canvasElement.width, y: landmarks[16].y * canvasElement.height },
                l: { x: landmarks[15].x * canvasElement.width, y: landmarks[15].y * canvasElement.height },
                time: Date.now()
            });
            if (traceHistory.length > 500) traceHistory.shift(); // Keep buffer sane
        }

        // 3. DRAW TRACE (with Transparency)
        ctx.globalAlpha = traceOpacity;
        ctx.lineWidth = 3;
        
        // Right path
        ctx.strokeStyle = "#ff4444";
        ctx.beginPath();
        traceHistory.forEach((pt, i) => {
            if (i === 0) ctx.moveTo(pt.r.x, pt.r.y);
            else ctx.lineTo(pt.r.x, pt.r.y);
        });
        ctx.stroke();

        // Left path
        ctx.strokeStyle = "#ffff00";
        ctx.beginPath();
        traceHistory.forEach((pt, i) => {
            if (i === 0) ctx.moveTo(pt.l.x, pt.l.y);
            else ctx.lineTo(pt.l.x, pt.l.y);
        });
        ctx.stroke();

        // 4. DRAW CURRENT SKELETON
        ctx.globalAlpha = 1.0;
        const ewData = calculateEWMN(landmarks);
        drawMarkers(landmarks, ewData); // From previous code
    }
    ctx.restore();
});

const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); }
});
camera.start();
</script>
</body>
</html>
